        f"<b>• نوع النشاط للرابط:</b> { 'قناة عامة' if 'channel' in target or target.startswith('@') else 'كروب دردشة عام' }.\n"
        f"<b>• حالة الحماية والأمان:</b> ضعيفة جداً وثغرات السبام مفتوحة.\n"
        f"<b>• الثغرات المكتشفة:</b>\n"
