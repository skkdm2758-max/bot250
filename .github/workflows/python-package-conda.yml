    markup.row(btn8)
    return markup

# كليشة الترحيب الرسمية عند إرسال /start
@bot.message_handler(commands=['start'])
def start(message):
    global report_counter, bot_users, rated_users
    
    if not check_forced_subscription(message.from_user.id):
        send_sub_alert(message.chat.id)
        return

    bot_users.add(message.from_user.id)
    total_members = len(bot_users)
    total_ratings = len(rated_users)

    first_name = message.from_user.first_name
    welcome_text = (
        f"👑 <b>مرحباً بك يا {first_name} في منظومة الدفاع والشد المتقدمة!</b>\n\n"
        f"⚜️ <b>كليشة النظام:</b>\n"
        f"« هذا البوت مخصص لفحص الثغرات البرمجية، إطلاق الهجمات الأمنية المكثفة، وإرسال البلاغات تلقائياً »\n\n"
        f"📊 <b>إحصائيات المنظومة الحية:</b>\n"
        f"• إجمالي الأعضاء المنضمين: <code>{total_members}</code> عضو فريد.\n"
        f"• إجمالي عداد الشد العام: <code>{report_counter}</code> شدة.\n"
        f"• عدد الذين قيموا البوت بالنجوم: <code>{total_ratings}</code> مستخدمين.\n"
        f"───────────────────\n"
        f"👇 <b>اختر القسم المطلوب من الأزرار المنسقة أدناه:</b>"
    )
    
    bot.send_message(message.chat.id, welcome_text, parse_mode="HTML", reply_markup=get_main_markup())

# معالج الأزرار الشفافة بالكامل بدون مشاكل
@bot.callback_query_handler(func=lambda call: True)
def callback_handler(call):
    global report_counter, stop_reporting, temp_target, bot_users, rated_users
    
    if not check_forced_subscription(call.from_user.id):
        bot.answer_callback_query(call.id, "⚠️ يجب عليك الاشتراك في القناة أولاً!", show_alert=True)
        send_sub_alert(call.message.chat.id)
        return

    # --- أقسام الفحص ---
    if call.data == "section_scan_bot":
        msg = bot.edit_message_text("🔍 <b>قسم كشف ثغرات ومخالفات البوتات:</b>\n\nأرسل يوزر البوت المراد فحص ثغراته (مثال: @Username):", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, process_bot_scan)
        
    elif call.data == "section_scan_site":
        msg = bot.edit_message_text("🔍 <b>قسم كشف ثغرات ومخالفات المواقع:</b>\n\nأرسل رابط الموقع المراد فحص ثغراته وسيرفره:", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, process_site_scan)

    elif call.data == "section_scan_group":
        msg = bot.edit_message_text("🔍 <b>قسم فحص ثغرات الكروبات والقنوات:</b>\n\nأرسل رابط الكروب أو معرف القناة المراد فحصها:", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, process_group_scan)

    # --- أقسام البلاغات والشد ---
    elif call.data == "section_report_bot":
        stop_reporting = False  
        msg = bot.edit_message_text("⚡ <b>شد بلاغات البوتات (+105 شدة):</b>\n\nأرسل يوزر البوت المخالف لبدء الضرب التلقائي التصاعدي:", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, lambda m: process_send_report(m, "bot"))
        
    elif call.data == "section_report_site":
        stop_reporting = False
        msg = bot.edit_message_text("🛰️ <b>شد بلاغات المواقع (+105 شدة):</b>\n\nأرسل رابط الموقع لبدء الشد التلقائي التصاعدي:", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, lambda m: process_send_report(m, "site"))

    elif call.data == "section_report_group":
        stop_reporting = False
        msg = bot.edit_message_text("📢 <b>شد بلاغات الكروبات والقنوات (+105 شدة):</b>\n\nأرسل رابط الكروب أو القناة لبدء حملة البلاغات المكثفة:", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, lambda m: process_send_report(m, "Group/Channel"))

    # --- قسم إعلان الهجوم الأمني ---
    elif call.data == "section_announce_attack":
        msg = bot.edit_message_text("🚀 <b>قسم إعلان هجوم أمني مكثف:</b>\n\nأرسل يوزر البوت، الرابط، أو معرف القناة/الكروب الذي تريد إعلان هجوم قوي ضده:", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        bot.register_next_step_handler(msg, process_announce_setup)

    elif call.data == "confirm_announcement":
        stop_reporting = False
        if "http" in temp_target: target_type = "site"
        elif "t.me/" in temp_target or temp_target.startswith("@"): target_type = "Group/Channel"
        else: target_type = "bot"
        
        bot.edit_message_text(f"⚔️ <b>تم تأكيد الإعلان! جاري بدء الهجوم الأمني المكثف على {temp_target}...</b>", call.message.chat.id, call.message.message_id, parse_mode="HTML")
        process_send_report(message=call.message, target_type=target_type, custom_target=temp_target)

    elif call.data == "stop_attack":
        stop_reporting = True  
        bot.answer_callback_query(call.id, "🛑 تم إرسال أمر إيقاف الشد فوراً...")

    # --- قسم التقييم بنظام العداد الحقيقي ---
    elif call.data == "rate_bot":
        if call.from_user.id not in rated_users:
            rated_users.add(call.from_user.id)
            bot.answer_callback_query(call.id, "🥰 شكراً لك! تم تسجيل تقييمك بـ 5 نجوم بنجاح وتحديث العداد.", show_alert=True)
            
            total_members = len(bot_users)
            total_ratings = len(rated_users)
            welcome_text = (
                f"👑 <b>منظومة الدفاع والشد المتقدمة</b>\n\n"
                f"📊 <b>إحصائيات المنظومة الحية:</b>\n"
                f"• إجمالي الأعضاء المنضمين: <code>{total_members}</code> عضو فريد.\n"
                f"• إجمالي عداد الشد العام: <code>{report_counter}</code> شدة.\n"
                f"• عدد الذين قيموا البوت بالنجوم: <code>{total_ratings}</code> مستخدمين.\n\n"
                f"اختر القسم المطلوب من الأسفل:"
            )
            try:
                bot.edit_message_text(welcome_text, call.message.chat.id, call.message.message_id, parse_mode="HTML", reply_markup=get_main_markup())
            except: pass
        else:
            bot.answer_callback_query(call.id, "⚠️ أنت قمت بتقييم البوت مسبقاً بنجاح! شكراً لك.", show_alert=True)

    # --- العودة للقائمة الرئيسية ---
    elif call.data == "back_home":
        total_members = len(bot_users)
        total_ratings = len(rated_users)
        welcome_text = (
            f"👑 <b>منظومة الدفاع والشد المتقدمة</b>\n\n"
            f"📊 <b>إحصائيات المنظومة الحية:</b>\n"
            f"• إجمالي الأعضاء المنضمين: <code>{total_members}</code> عضو فريد.\n"
            f"• إجمالي عداد الشد العام: <code>{report_counter}</code> شدة.\n"
            f"• عدد الذين قيموا البوت بالنجوم: <code>{total_ratings}</code> مستخدمين.\n\n"
            f"اختر القسم المطلوب من الأسفل:"
        )
        try:
            bot.edit_message_text(welcome_text, call.message.chat.id, call.message.message_id, parse_mode="HTML", reply_markup=get_main_markup())
        except: pass

# --- دوال المعالجة المتقدمة للفحص (Next Steps) ---
