        f"  - [!] رابط الانضمام لا يحتوي على نظام حماية التحقق الذكي (Captcha).\n"
        f"<b>• المخالفات المرصودة:</b>\n"
        f"  - نشر وتداول روابط ملغمة/فيشينج تضر بالمستخدمين.\n"
