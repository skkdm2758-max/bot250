    )
    markup = types.InlineKeyboardMarkup().row(types.InlineKeyboardButton("🔙 العودة للقائمة الرئيسية", callback_data="back_home"))
    bot.send_message(message.chat.id, result_text, parse_mode="HTML", reply_markup=markup)

# --- دالة إعداد إعلان الهجوم الأمني المطور ---
def process_announce_setup(message):
    if not check_forced_subscription(message.from_user.id): return
    global temp_target
    temp_target = message.text.strip()
    
    if "http" in temp_target: attack_type = "إسقاط سيرفر وحظر الاستضافة (DDoS Attack)"
    elif "t.me/" in temp_target or temp_target.startswith("@"): attack_type = "سيل بلاغات مكثفة للجروب/القناة (Abuse Strike)"
    else: attack_type = "سيل بلاغات مكثفة حارقة للبوت (Mass Report)"
    
    announce_text = (
        f"📢 <b>[ إعلان هجوم أمني عاجل ومكثف ]</b> 📢\n"
        f"───────────────────\n"
        f"🎯 <b>الهدف المستهدف:</b> <code>{temp_target}</code>\n"
        f"⚔️ <b>نوع الهجوم:</b> {attack_type}\n"
        f"🔥 <b>الحالة:</b> جاهز للتنفيذ والشد التصاعدي الفوري بقوة 105 شدة حارقة.\n"
        f"───────────────────\n"
        f"⚠️ <i>هل تريد إطلاق الهجوم وتعميم الإعلان الآن؟ اختر من الأزرار الشفافة أدناه:</i>"
    )
    
    markup = types.InlineKeyboardMarkup()
    btn_confirm = types.InlineKeyboardButton("⚔️ إطلاق الهجوم الآن", callback_data="confirm_announcement")
    btn_cancel = types.InlineKeyboardButton("❌ إلغاء العملية", callback_data="back_home")
    markup.row(btn_confirm, btn_cancel)
    
    bot.send_message(message.chat.id, announce_text, parse_mode="HTML", reply_markup=markup)

# --- دالة الشد التصاعدي التلقائية الشاملة للبوتات والمواقع والكروبات ---
def process_send_report(message, target_type, custom_target=None):
    global report_counter, stop_reporting
    target_name = custom_target if custom_target else message.text.strip()
    
    stop_markup = types.InlineKeyboardMarkup().row(types.InlineKeyboardButton("🛑 إيقاف الشد الآن", callback_data="stop_attack"))
    status_msg = bot.send_message(message.chat.id, f"🚀 <b>بدأ هجوم الشد التلقائي التصاعدي على ({target_name})... [⏳]</b>", parse_mode="HTML", reply_markup=stop_markup)
    
    total_burst = 105
    interrupted = False
    
    for i in range(1, total_burst + 1):
        if stop_reporting:  
            interrupted = True
            break
            
        details = f"The dangerous {target_type} {target_name} violation checkpoint [ID: {i}]"
        send_abuse_email(target_type, target_name, details)
        
        report_counter += 1
        
        if i % 5 == 0 or i == total_burst:
            try:
                bot.edit_message_text(
                    f"⚡ <b>جاري الشد التلقائي المستمر...</b>\n\n🎯 الهدف: {target_name}\n🔥 <b>الحالة:</b> [ شد {i} ] 📈 صعوداً إلى {total_burst}...",
                    message.chat.id, status_msg.message_id, parse_mode="HTML", reply_markup=stop_markup
                )
            except: pass
        time.sleep(0.04)

    markup = types.InlineKeyboardMarkup().row(types.InlineKeyboardButton("🔙 العودة للقائمة الرئيسية", callback_data="back_home"))
    
    if interrupted:
        status_text = f"🛑 <b>تم إيقاف عملية الشد بنجاح بناءً على طلبك!</b>\n\n🎯 <b>الهدف:</b> <code>{target_name}</code>\n📊 توقفت الضربات عند العدد المذكور أعلاه وتم حفظ الإحصائيات الحالية بنجاح."
    else:
        status_text = f"🔥 <b>اكتمل الشد التصاعدي بنجاح تام!</b>\n\n🎯 <b>الهدف المضروب:</b> <code>{target_name}</code>\n⚡ صعد البوت بنجاح حتى <b>[ شد {total_burst} ]</b> بدون توقف.\n📊 <b>إجمالي العداد الجديد:</b> <code>{report_counter}</code> شدة."

    bot.send_message(message.chat.id, status_text, parse_mode="HTML", reply_markup=markup)

