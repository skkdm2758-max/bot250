    target = message.text.strip()
    result_text = (
        f"🤖 <b>تقرير فحص البوت تفصيلياً:</b> <code>{target}</code>\n\n"
        f"<b>• النوع:</b> بوت خدمي/تفاعلي (Telegram Bot API).\n"
        f"<b>• معلومات السيرفر:</b> متصل بـ Datacenter 4.\n"
        f"<b>• الثغرات المكتشفة:</b>\n"
        f"  - [!] ثغرة Flood Control غير مفعلة (قابل للسبام والضرب).\n"
        f"  - [!] عدم وجود حماية ضد الـ Brute Force في استقبال البيانات.\n"
        f"<b>• المخالفات المكتشفة:</b>\n"
        f"  - استخدام مكتبات برمجية مسربة وغير موثقة.\n"
        f"  - مخالفة سياسة الاستخدام التلغرام (إرسال رسائل سبام).\n"
        f"<b>• التقييم الأمني الحقيقي:</b> خطر وضغيف جداً."
    )
    markup = types.InlineKeyboardMarkup().row(types.InlineKeyboardButton("🔙 العودة للقائمة الرئيسية", callback_data="back_home"))
    bot.send_message(message.chat.id, result_text, parse_mode="HTML", reply_markup=markup)

