# دالة التحقق من الاشتراك الإجباري
def check_forced_subscription(user_id):
    try:
        member = bot.get_chat_member(f"@{CHANNEL_USERNAME}", user_id)
        if member.status in ['creator', 'administrator', 'member']:
            return True
        return False
    except Exception as e:
        print(f"Sub Check Error: {e}")
        return True

# دالة إرسال رسالة التنبيه للاشتراك الإجباري
def send_sub_alert(chat_id):
    welcome_text = (
        "⚠️ <b>عذراً عزيزي، يجب عليك الاشتراك في قناة البوت أولاً لاستخدام الخدمات!</b>\n\n"
        f"قم بالاشتراك في القناة ثم أرسل /start مجدداً لتفعيل البوت."
    )
    markup = types.InlineKeyboardMarkup()
    btn_sub = types.InlineKeyboardButton("📢 اشترك في القناة الآن", url=f"https://t.me/{CHANNEL_USERNAME}")
    markup.row(btn_sub)
    bot.send_message(chat_id, welcome_text, parse_mode="HTML", reply_markup=markup)

# دالة الشد وإرسال الإيميلات التلقائية
def send_abuse_email(target_type, target_name, abuse_details):
    try:
        to_email = "abuse@telegram.org" if target_type in ["bot", "Group/Channel"] else "abuse@cloudflare.com"
        msg = MIMEMultipart()
        msg['From'] = SENDER_EMAIL
        msg['To'] = to_email
        msg['Subject'] = f"URGENT: Permanent Abuse Report Against Malicious {target_type.upper()} ({target_name})"
        
        body = f"Dear Security Team,\n\nTarget Link/Username: {target_name}\nType: {target_type}\nDetails:\n{abuse_details}"
        msg.attach(MIMEText(body, 'plain'))
        
        server = smtplib.SMTP(SMTP_SERVER, SMTP_PORT)
        server.starttls()
        server.login(SENDER_EMAIL, SENDER_PASSWORD)
        server.sendmail(SENDER_EMAIL, to_email, msg.as_string())
        server.quit()
        return True
    except:
        return False

# دالة إنشاء القائمة الرئيسية لمنع تكرار الكود
